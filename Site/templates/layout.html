<!doctype html>
<html>
    <head>
        <link
            rel="stylesheet"
            type="text/css"
            href="{{ url_for('static', filename='style.css') }}"
        />

        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        {% if title %}
        <title>Khushal Neekhra - {{ title }}</title>
        {% else %}
        <title>Khusahl Neekhra</title>
        {% endif %}
    </head>
    <body>
        <div class="content">{% block content %}{% endblock %}</div>
    </body>
</html>
